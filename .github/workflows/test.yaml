name: Run Tests

on:
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out the code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -r services/yolo/torch-requirements.txt
          pip install -r services/yolo/requirements.txt

      - name: Run tests
        run: pytest tests/
        working-directory: services/yolo
        env:
          AWS_REGION: us-east-1
          AWS_S3_BUCKET: fake-bucket
          AWS_ACCESS_KEY_ID: fake
          AWS_SECRET_ACCESS_KEY: fake

  agent-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Check out the code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r services/agent/requirements.txt

      - name: Run tests
        run: pytest tests/ -v
        working-directory: services/agent
        env:
          MODEL: bedrock_converse/anthropic.claude-3-5-haiku-20241022-v1:0
          AWS_DEFAULT_REGION: us-east-1
          AWS_REGION: us-east-1
          AWS_S3_BUCKET: fake-bucket
          AWS_ACCESS_KEY_ID: fake
          AWS_SECRET_ACCESS_KEY: fake