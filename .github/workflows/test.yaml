name: Run Tests

on:
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out the code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -r services/yolo/torch-requirements.txt
          pip install -r services/yolo/requirements.txt

      - name: Run tests
        run: pytest tests/
        working-directory: services/yolo
        env:
          AWS_REGION: us-east-1
          AWS_S3_BUCKET: fake-bucket
          AWS_ACCESS_KEY_ID: fake
          AWS_SECRET_ACCESS_KEY: fake

  agent-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Check out the code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r services/agent/requirements.txt

      - name: Run tests
        run: pytest tests/ -v
        working-directory: services/agent
        env:
          MODEL: bedrock_converse/anthropic.claude-3-5-haiku-20241022-v1:0
          AWS_DEFAULT_REGION: us-east-1
          AWS_REGION: us-east-1
          AWS_S3_BUCKET: fake-bucket
          AWS_ACCESS_KEY_ID: fake
          AWS_SECRET_ACCESS_KEY: fake

  scout-yolo:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      pull-requests: write
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build YOLO image
        uses: docker/build-push-action@v5
        with:
          context: services/yolo
          push: false
          load: true
          tags: talalhussien/yolo-service:scout

      - name: Scan YOLO image with Docker Scout
        uses: docker/scout-action@v1
        with:
          command: cves
          image: talalhussien/yolo-service:scout
          only-severities: critical,high
          exit-code: false

  scout-agent:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      pull-requests: write
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build agent image
        uses: docker/build-push-action@v5
        with:
          context: services/agent
          push: false
          load: true
          tags: talalhussien/agent-service:scout

      - name: Scan agent image with Docker Scout
        uses: docker/scout-action@v1
        with:
          command: cves
          image: talalhussien/agent-service:scout
          only-severities: critical,high
          exit-code: false

  scout-frontend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      pull-requests: write
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: services/frontend
          push: false
          load: true
          tags: talalhussien/frontend-service:scout

      - name: Scan frontend image with Docker Scout
        uses: docker/scout-action@v1
        with:
          command: cves
          image: talalhussien/frontend-service:scout
          only-severities: critical,high
          exit-code: false
