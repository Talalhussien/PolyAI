name: YOLO Service CI

on:
  pull_request:
    paths:
      - 'services/yolo/**'
      - 'services/agent/**'
      - 'services/frontend/**'
      - '.github/workflows/**
   

jobs:
  test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: services/yolo

    steps:
      - name: Check out the code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: services/yolo/requirements.txt

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run tests with coverage
        run: pytest tests/